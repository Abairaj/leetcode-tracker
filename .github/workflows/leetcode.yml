name: Daily LeetCode Tracker

on:
  workflow_dispatch:

  schedule:
    # Runs every day at 18:30 UTC = 12:00 AM IST
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tracker
        run: |
          python tracker.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add logs/

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "📘 Daily LeetCode Log - $(date +'%Y-%m-%d')"
            git push
          fi